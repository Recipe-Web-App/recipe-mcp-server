services:
  recipe-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sqlite-data:/app/data
    environment:
      - RECIPE_MCP_TRANSPORT=http
      - RECIPE_MCP_REDIS_URL=redis://redis:6379/0
      - RECIPE_MCP_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  jaeger:
    image: jaegertracing/jaeger:2
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

volumes:
  sqlite-data:
  redis-data:
