name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: hadolint --config .config/hadolint.yaml Dockerfile

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv sync --frozen --extra dev
      - run: uv run mypy src/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: osv-scanner scan --config .config/osv-scanner.toml --lockfile uv.lock

  test-unit:
    name: Unit Tests
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/unit/ -m unit --cov=src/recipe_mcp_server --cov-report=xml --cov-branch -v
      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: |
            coverage.xml
            .coverage

  test-integration:
    name: Integration Tests
    needs: [test-unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/integration/ -m integration -v

  test-e2e:
    name: E2E Tests
    needs: [test-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/e2e/ -m e2e -v

  test-protocol:
    name: Protocol Tests
    needs: [test-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/protocol/ -v

  coverage-check:
    name: Coverage Gate (85%)
    needs: [test-unit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv sync --frozen --extra dev
      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
      - run: uv run coverage report --fail-under=85

  docker-build:
    name: Docker Build
    needs: [test-unit, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: recipe-mcp-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
