name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Call tool '...'
        2. With parameters '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or logs if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Recipe MCP Server version (check `__init__.py`)
      placeholder: "0.1.0"

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - HTTP
        - Both

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem (logs, screenshots, config).
