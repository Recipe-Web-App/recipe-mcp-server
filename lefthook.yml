pre-commit:
  parallel: true
  commands:
    ruff-format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
    ruff-check:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
    taplo-format:
      glob: "*.toml"
      run: taplo format {staged_files}
      stage_fixed: true
    prettier:
      glob: "*.{json,yaml,yml,md}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    hadolint:
      glob: "Dockerfile*"
      run: hadolint {staged_files}
    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}
    gitleaks:
      run: gitleaks protect --staged --no-banner

commit-msg:
  commands:
    gitfluff:
      run: gitfluff lint {1}

pre-push:
  parallel: true
  commands:
    unit-tests:
      run: uv run pytest tests/unit/ -x -q
    type-check:
      run: uv run mypy src/
    lint:
      run: uv run ruff check .
